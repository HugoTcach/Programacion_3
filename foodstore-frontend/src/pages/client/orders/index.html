<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Mis Pedidos</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">🍕 Food Store</div>
    <nav>
      <a href="/src/pages/store/home/index.html">Inicio</a>
      <a href="/src/pages/client/orders/index.html" class="active">Mis Pedidos</a>
      <a href="/src/pages/store/cart/index.html">🛒 Carrito <span id="cart-badge" class="badge-count">0</span></a>
      <span id="user-name-display" class="user-name"></span>
      <button id="logout-btn" class="btn-secondary">Cerrar Sesión</button>
    </nav>
  </header>

  <main class="orders-container">
    <h2>Mis Pedidos</h2>
    
    <div id="empty-orders-msg" class="empty-state" style="display: none;">
      <p>Aún no tienes pedidos registrados.</p>
      <button class="btn-primary mt-1" onclick="window.location.href='/src/pages/store/home/index.html'" style="max-width: 200px;">Ir a la tienda</button>
    </div>
    
    <div id="orders-list" class="orders-list">
      </div>
  </main>

  <div id="order-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <span class="modal-close" id="modal-close">&times;</span>
      <div id="modal-body">
        </div>
    </div>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
