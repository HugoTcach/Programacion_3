<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Gestión de Productos</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="admin-body" style="display: none;">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Administración<br><small>Panel de control</small></div>
      <nav class="admin-nav">
        <a href="/src/pages/admin/adminHome/index.html">📊 Dashboard</a>
        <a href="/src/pages/admin/categories/index.html">📁 Categorías</a>
        <a href="/src/pages/admin/products/index.html" class="active">🍔 Productos</a>
        <a href="/src/pages/admin/orders/index.html">📦 Pedidos</a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="/src/pages/store/home/index.html">🏪 Ver Tienda</a>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2>Gestión de Productos</h2>
        <div class="admin-user-info">
          <span id="admin-name">Admin</span>
          <button id="logout-btn" class="btn-secondary">Cerrar Sesión</button>
        </div>
      </header>

      <div class="admin-content">
        <div class="admin-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h3>Listado de Productos</h3>
            <button id="btn-add-product" class="btn-primary" style="width: auto;">+ Nuevo Producto</button>
          </div>
          
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Precio</th>
                  <th>Stock</th>
                  <th>Disponibilidad</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="product-tbody">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="product-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
      <span class="modal-close" id="modal-close">&times;</span>
      <h3 id="modal-title" style="margin-bottom: 1.5rem;">Nuevo Producto</h3>
      <form id="product-form">
        <input type="hidden" id="prod-id" />
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="prod-nombre">Nombre</label>
            <input type="text" id="prod-nombre" required />
          </div>
          <div class="form-group">
            <label for="prod-cat">Categoría</label>
            <select id="prod-cat" required style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;">
              </select>
          </div>
        </div>
        
        <div class="form-group">
          <label for="prod-desc">Descripción</label>
          <input type="text" id="prod-desc" required />
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="prod-precio">Precio ($)</label>
            <input type="number" step="0.01" min="0" id="prod-precio" required />
          </div>
          <div class="form-group">
            <label for="prod-stock">Stock Inicial</label>
            <input type="number" min="0" id="prod-stock" required />
          </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
          <input type="checkbox" id="prod-disp" checked style="width: auto;" />
          <label for="prod-disp" style="margin: 0; cursor: pointer; font-weight: normal;">Producto visible y disponible en la tienda</label>
        </div>
        
        <div class="action-buttons" style="margin-top: 2rem;">
          <button type="submit" class="btn-primary">Guardar</button>
          <button type="button" class="btn-secondary" id="btn-cancel-modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./products.ts"></script>
</body>
</html>
