<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Gestión de Pedidos</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="admin-body" style="display: none;">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Administración<br><small>Panel de control</small></div>
      <nav class="admin-nav">
        <a href="/src/pages/admin/adminHome/index.html">📊 Dashboard</a>
        <a href="/src/pages/admin/categories/index.html">📁 Categorías</a>
        <a href="/src/pages/admin/products/index.html">🍔 Productos</a>
        <a href="/src/pages/admin/orders/index.html" class="active">📦 Pedidos</a>
      </nav>
      <div class="admin-sidebar-footer">
        <a href="/src/pages/store/home/index.html">🏪 Ver Tienda</a>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2>Gestión de Pedidos</h2>
        <div class="admin-user-info">
          <span id="admin-name">Admin</span>
          <button id="logout-btn" class="btn-secondary">Cerrar Sesión</button>
        </div>
      </header>

      <div class="admin-content">
        <div class="admin-panel">
          <h3 style="margin-bottom: 1.5rem;">Historial General de Pedidos</h3>
          
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID Pedido</th>
                  <th>Fecha</th>
                  <th>ID Usuario</th>
                  <th>Total</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="order-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
      <span class="modal-close" id="modal-close">&times;</span>
      <h3 id="modal-title" style="margin-bottom: 1rem;">Detalle del Pedido</h3>
      
      <div id="modal-order-details" style="margin-bottom: 1.5rem; background: #f9fafb; padding: 1rem; border-radius: 4px; border: 1px solid #eee;">
        </div>

      <form id="order-status-form">
        <input type="hidden" id="order-id" />
        <div class="form-group">
          <label for="order-status"><strong>Actualizar Estado:</strong></label>
          <select id="order-status" required style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
            <option value="PENDIENTE">PENDIENTE</option>
            <option value="EN PREPARACION">EN PREPARACION</option>
            <option value="TERMINADO">TERMINADO</option>
            <option value="CANCELADO">CANCELADO</option>
          </select>
        </div>
        
        <div class="action-buttons" style="margin-top: 1.5rem;">
          <button type="submit" class="btn-primary">Guardar Cambios</button>
          <button type="button" class="btn-secondary" id="btn-cancel-modal">Cerrar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
