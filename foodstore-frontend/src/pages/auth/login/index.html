<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store - Iniciar Sesión</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="login-container">
    <h2>SuperFood</h2>
    <h3>Iniciar Sesión</h3>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" required />
      </div>
      <p id="error-message" class="error-message" style="display: none; color: red;"></p>
      <button type="submit">Ingresar</button>
    </form>
    <div class="test-accounts">
      <p><small>Cuentas de prueba:</small></p>
      <p><small>Admin: admin@admin.com / 123456</small></p>
      <p><small>Cliente: cliente@food.com / cliente123</small></p>
    </div>
  </div>
  <script type="module" src="./login.ts"></script>
</body>
</html>
